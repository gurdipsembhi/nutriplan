steps:
  # ── 1. Build server Docker image ────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build-server
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/server:$SHORT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/server:latest
      - ./server

  # ── 2. Push image to Artifact Registry ──────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: push-server
    waitFor: ["build-server"]
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/server

  # ── 3. Deploy backend to Cloud Run ──────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-server
    waitFor: ["push-server"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/server:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --set-env-vars=NODE_ENV=production
      - --update-secrets=MONGODB_URI=MONGODB_URI:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,CLIENT_URL=CLIENT_URL:latest,CLAUDE_MODEL=CLAUDE_MODEL:latest,CLAUDE_MAX_TOKENS=CLAUDE_MAX_TOKENS:latest

  # ── 4. Get the deployed Cloud Run URL ───────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: get-url
    waitFor: ["deploy-server"]
    entrypoint: bash
    args:
      - -c
      - |
        URL=$$(gcloud run services describe $_SERVICE_NAME \
          --region=$_REGION \
          --format="value(status.url)")
        echo "BACKEND_URL=$$URL" > /workspace/backend_url.env
        echo "Cloud Run URL: $$URL"

  # ── 5. Install client deps & build frontend ─────────────────
  - name: "node:20-alpine"
    id: build-frontend
    waitFor: ["get-url"]
    entrypoint: sh
    args:
      - -c
      - |
        source /workspace/backend_url.env
        cd client
        npm install
        echo "VITE_API_URL=$$BACKEND_URL" > .env.production
        echo "VITE_APP_NAME=NutriPlan"  >> .env.production
        npm run build
        echo "Frontend built with VITE_API_URL=$$BACKEND_URL"

  # ── 6. Deploy frontend to Firebase Hosting ──────────────────
  - name: "node:20-alpine"
    id: deploy-frontend
    waitFor: ["build-frontend"]
    entrypoint: sh
    secretEnv: ["FIREBASE_TOKEN"]
    args:
      - -c
      - |
        npm install -g firebase-tools --quiet
        firebase deploy --only hosting \
          --token "$$FIREBASE_TOKEN" \
          --project $PROJECT_ID \
          --non-interactive

# ── Images to store ───────────────────────────────────────────
images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/server:$SHORT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/server:latest

# ── Secrets from Secret Manager ───────────────────────────────
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_TOKEN/versions/latest
      env: FIREBASE_TOKEN

# ── Substitution defaults (override in trigger if needed) ─────
substitutions:
  _REGION: asia-south1
  _REPO: nutriplan
  _SERVICE_NAME: nutriplan-server

options:
  logging: CLOUD_LOGGING_ONLY
